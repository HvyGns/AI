<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defending the Grid: PLC Security Lab</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --accent-red: #da3633;
            --accent-yellow: #d29922;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--accent-blue);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8b949e;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        h2 {
            color: white;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            font-size: 1.4rem;
        }

        /* Simulation Canvas Styles */
        .simulation-container {
            position: relative;
            background-color: #05070a;
            border: 2px solid #21262d;
            border-radius: 6px;
            height: 350px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .water-tank {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 200px;
            border: 4px solid #8b949e;
            border-top: none;
            border-radius: 0 0 10px 10px;
            background: rgba(255, 255, 255, 0.02);
        }

        .water {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, #1f6feb, #044289);
            transition: height 0.3s ease, background-color 0.5s ease;
        }

        .water.corrupted {
            background: linear-gradient(180deg, #da3633, #8e1513) !important;
        }

        .sensor-line {
            position: absolute;
            width: 100%;
            border-top: 2px dashed var(--accent-red);
            top: 20%;
            left: 0;
        }

        .sensor-label {
            position: absolute;
            right: -85px;
            top: -12px;
            color: var(--accent-red);
            font-size: 0.8rem;
            font-weight: bold;
        }

        .valve {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #30363d;
            border: 2px solid #8b949e;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        #inletValve {
            top: 70px;
            left: 120px;
        }

        #outletValve {
            bottom: 35px;
            right: 120px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-normal { background-color: rgba(35, 134, 54, 0.2); color: #56d364; border: 1px solid var(--accent-green); }
        .status-alert { background-color: rgba(218, 54, 51, 0.2); color: #ff7b72; border: 1px solid var(--accent-red); }

        /* Controls / Interaction */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: auto;
        }

        .btn {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        .btn-attack {
            background-color: rgba(218, 54, 51, 0.1);
            border-color: var(--accent-red);
            color: #ff7b72;
        }

        .btn-attack:hover {
            background-color: var(--accent-red);
            color: white;
        }

        .btn-secure {
            background-color: rgba(35, 134, 54, 0.1);
            border-color: var(--accent-green);
            color: #56d364;
        }

        .btn-secure:hover {
            background-color: var(--accent-green);
            color: white;
        }

        /* Explanations & Steps */
        .step-card {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .step-card.active {
            border-color: var(--accent-blue);
        }

        .terminal {
            background-color: #05070a;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            color: #39ff14;
            height: 120px;
            overflow-y: auto;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .defense-opt {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .defense-opt input {
            cursor: pointer;
        }

        .badge-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            background: #0d1117;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Securing the Physical World</h1>
        <div class="subtitle">An Interactive Introduction to PLC & ICS Security</div>
    </header>

    <div class="grid-layout">
        <div class="panel">
            <h2>Industrial Process Simulation</h2>
            
            <div class="badge-container">
                <div>System Status: <span id="sysStatus" class="status-badge status-normal">Normal</span></div>
                <div>Water Level: <span id="levelDisplay" style="font-weight: bold; color: var(--accent-blue);">50%</span></div>
            </div>

            <div class="simulation-container">
                <div style="position: absolute; top: 80px; left: 0; width: 120px; height: 20px; background: #30363d;"></div>
                <div id="inletValve" class="valve" style="color: #56d364;">ON</div>
                
                <div class="water-tank">
                    <div class="sensor-line">
                        <div class="sensor-label">High Limit (85%)</div>
                    </div>
                    <div id="waterFlow" class="water"></div>
                </div>

                <div style="position: absolute; bottom: 45px; right: 0; width: 120px; height: 20px; background: #30363d;"></div>
                <div id="outletValve" class="valve" style="color: #56d364;">ON</div>
            </div>

            <div class="controls-grid">
                <button class="btn btn-attack" onclick="triggerAttack()">Launch Cyber Attack</button>
                <button class="btn" onclick="resetSimulation()">Reset System</button>
            </div>

            <div class="terminal" id="terminalLog">
                &gt; PLC executing control loop normally...<br>
                &gt; Sensors matching physical states.
            </div>
        </div>

        <div class="panel">
            <h2>Interactive Engineering Journal</h2>
            
            <div id="lessonContent">
                </div>

            <div style="margin-top: auto; display: flex; justify-content: space-between; padding-top: 15px;">
                <button class="btn" id="prevBtn" onclick="moveStep(-1)" disabled>Previous</button>
                <button class="btn btn-secure" id="nextBtn" onclick="moveStep(1)">Next Concept</button>
            </div>
        </div>
    </div>
</div>

<script>
    // System Variables
    let waterLevel = 50;
    let inletOpen = true;
    let outletOpen = true;
    let isAttacked = false;
    let defenseDeployed = false;
    let simulationInterval;
    let currentStep = 0;

    // Lesson Data Structure
    const lessons = [
        {
            title: "1. What is a PLC?",
            text: "Welcome to the engineering floor! In a standard enterprise network, computers process bytes of data. But in <strong>Industrial Control Systems (ICS)</strong>, computers manage the physical world.<br><br>Meet the <strong>Programmable Logic Controller (PLC)</strong>. It is a hardened industrial computer that reads variables from input sensors (like our water levels) and issues commands to outputs (like mechanical valves).",
            task: "Observe the simulation. The PLC maintains balance by cycling the valves. Click 'Next Concept' to see what happens when trust goes unverified."
        },
        {
            title: "2. The Vulnerability of Blind Trust",
            text: "Legacy industrial protocols (like Modbus or Profinet) were engineered decades ago for reliability, long before cybersecurity existed. They lack basic <strong>authentication</strong>.<br><br>This means if an attacker gains network access, they can send raw commands directly to the PLC, or forge sensor logs entirely. The PLC assumes any network instruction it receives is legitimate.",
            task: "Click the <strong>'Launch Cyber Attack'</strong> button on the left to see how an adversary exploits this lack of authentication."
        },
        {
            title: "3. Analyzing the Exploit",
            text: "Look at the logs and the tank! The attacker initiated a <strong>Man-in-the-Middle (MitM) / Spoofing attack</strong>. They forced the inlet valve completely open while injecting false telemetry to your monitor saying everything is 'Normal' at 50%.<br><br>Because the PLC cannot authenticate the source of commands, it remains blind until catastrophic structural failure or spillover occurs.",
            task: "We must remediate this. Select a mitigation option below to patch our security architecture."
        },
        {
            title: "4. Deploying Defensive Architectures",
            text: "Securing modern operational environments requires layering controls. We cannot always easily replace millions of dollars of legacy PLCs, so we use protective rings around them.",
            task: "Choose the correct strategy to protect our infrastructure below:",
            interactive: true
        }
    ];

    // Initialize Simulation Control Loop
    function runControlLoop() {
        if (simulationInterval) clearInterval(simulationInterval);
        
        simulationInterval = setInterval(() => {
            if (!isAttacked) {
                // Normal PLC Automation Logic
                if (waterLevel >= 75) {
                    inletOpen = false;
                    outletOpen = true;
                } else if (waterLevel <= 40) {
                    inletOpen = true;
                    outletOpen = false;
                }
            } else {
                // Attacker Hijacked Logic: Force open, mask telemetry
                inletOpen = true;
                outletOpen = false;
            }

            // Apply physics based on states
            if (inletOpen && waterLevel < 100) waterLevel += 2.5;
            if (outletOpen && waterLevel > 0) waterLevel -= 1.5;

            updateUI();
        }, 300);
    }

    function updateUI() {
        const waterEl = document.getElementById('waterFlow');
        const levelDisplay = document.getElementById('levelDisplay');
        const sysStatus = document.getElementById('sysStatus');
        const inletValve = document.getElementById('inletValve');
        const outletValve = document.getElementById('outletValve');

        // Update tank physics presentation
        waterEl.style.height = waterLevel + '%';
        
        // Update valve indicators
        inletValve.textContent = inletOpen ? "ON" : "OFF";
        inletValve.style.color = inletOpen ? "#56d364" : "#ff7b72";
        outletValve.textContent = outletOpen ? "ON" : "OFF";
        outletValve.style.color = outletOpen ? "#56d364" : "#ff7b72";

        if (isAttacked && !defenseDeployed) {
            // Spoofed Human-Machine Interface (HMI) values vs reality
            levelDisplay.textContent = "50% (Spoofed)";
            levelDisplay.style.color = varColor('--accent-yellow');
            sysStatus.textContent = "Normal (Tampered)";
            sysStatus.className = "status-badge status-normal";
            
            if (waterLevel >= 95) {
                waterEl.classList.add('corrupted');
                logTerminal("CRITICAL FAILURE: Physical tank overflow detected!");
            }
        } else {
            waterEl.classList.remove('corrupted');
            levelDisplay.textContent = Math.round(waterLevel) + '%';
            levelDisplay.style.color = varColor('--accent-blue');
            
            if (waterLevel >= 85) {
                sysStatus.textContent = "High Limit Alert";
                sysStatus.className = "status-badge status-alert";
            } else {
                sysStatus.textContent = "Normal";
                sysStatus.className = "status-badge status-normal";
            }
        }
    }

    function triggerAttack() {
        isAttacked = true;
        logTerminal("ALERT: Unauthorized Write command executed on Register 0x0024");
        logTerminal("ALERT: False Data Injection payload deployed. HMI reports static 50%.");
        if(currentStep === 1) moveStep(1);
    }

    function resetSimulation() {
        waterLevel = 50;
        isAttacked = false;
        defenseDeployed = false;
        logTerminal("System restored to factory baselines. Control loop restarted.");
        runControlLoop();
    }

    function logTerminal(message) {
        const log = document.getElementById('terminalLog');
        log.innerHTML += `<br>&gt; ${message}`;
        log.scrollTop = log.scrollHeight;
    }

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // Interactive Journal Navigation
    function displayStep() {
        const current = lessons[currentStep];
        let html = `
            <div class="step-card active">
                <h3>${current.title}</h3>
                <p style="margin: 12px 0; color: #e6edf3;">${current.text}</p>
                <div style="border-top: 1px solid var(--border-color); padding-top: 10px; font-style: italic; color: var(--accent-blue);">
                    <strong>Task:</strong> ${current.task}
                </div>
            </div>
        `;

        if (current.interactive) {
            html += `
                <div class="defense-opt">
                    <input type="radio" id="opt1" name="defense" value="wrong">
                    <label name="lbl" for="opt1">Install an antivirus software client directly onto the legacy PLC firmware.</label>
                </div>
                <div class="defense-opt">
                    <input type="radio" id="opt2" name="defense" value="correct">
                    <label name="lbl" for="opt2">Segment networks using DMZs, and deploy Network Level Authentication / Encryption via Deep Packet Inspection (DPI) firewalls.</label>
                </div>
                <button class="btn btn-secure" style="margin-top:10px; width:100%;" onclick="evaluateDefense()">Commit Security Control</button>
            `;
        }

        document.getElementById('lessonContent').innerHTML = html;
        
        // Button boundary constraints
        document.getElementById('prevBtn').disabled = (currentStep === 0);
        document.getElementById('nextBtn').disabled = (currentStep === lessons.length - 1 || current.interactive);
    }

    function moveStep(direction) {
        currentStep += direction;
        displayStep();
    }

    function evaluateDefense() {
        const isCorrect = document.getElementById('opt2').checked;
        if (isCorrect) {
            defenseDeployed = true;
            isAttacked = false;
            logTerminal("SUCCESS: Network segment isolated. Unauthorized registers dropped by inline DPI firewall protection.");
            alert("Excellent engineering choice! Legacy PLCs cannot run standard OS antivirus software due to resource constraints. Network segmentation and inline industrial protocol firewalls are essential mitigations.");
            document.getElementById('nextBtn').disabled = false;
        } else {
            alert("Incorrect mitigation. Remember: PLCs run proprietary, lightweight execution loops. They don't have operating systems like Windows or Linux that run traditional antivirus endpoints.");
        }
    }

    // Startup Execution
    runControlLoop();
    displayStep();
</script>
</body>
</html>
